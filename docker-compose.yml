services:
  db:
    image: postgres:16
    container_name: claimguard-db
    environment:
      POSTGRES_USER: claimguard
      POSTGRES_PASSWORD: claimguard
      POSTGRES_DB: claimguard
    ports:
      - "5432:5432"
    volumes:
      - claimguard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimguard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  claimguard_pgdata:
